services:
  - type: web
    name: weego-messenger
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      npm ci
      npm run build
    startCommand: gunicorn "backend.app:app" --workers 2 --threads 4 --worker-class gthread --bind 0.0.0.0:$PORT --timeout 120 --log-level info
    healthCheckPath: /api/ping
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: weego-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: TOKEN_TTL_HOURS
        value: "720"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: "Admin"
      - key: ADMIN_PHONE
        value: "+380000000000"
      - key: MESSENGER_ENCRYPTION_KEYS
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
    plan: free

databases:
  - name: weego-db
    databaseName: weego_messenger
    user: weego
    plan: free
