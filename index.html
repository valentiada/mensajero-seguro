<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Колібрі — Casino & Messenger</title>
    <meta name="description" content="Колібрі — казино та захищений месенджер" />
    <meta name="theme-color" content="#0B1A12" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230B1A12'/%3E%3Ctext x='16' y='22' font-family='monospace' font-size='14' font-weight='bold' fill='%23E4A24B' text-anchor='middle'%3EК%3C/text%3E%3C/svg%3E" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: #0B1A12; }
      #root { height: 100%; }
      /* Native splash — shows while JS loads, React replaces it */
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        background: #0B1A12;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 20px;
        transition: opacity 0.4s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash-logo {
        width: 72px; height: 72px; border-radius: 20px;
        background: linear-gradient(135deg, #163524, #0d1f18);
        border: 1.5px solid rgba(228,162,75,0.4);
        box-shadow: 0 0 40px rgba(228,162,75,0.15);
        display: flex; align-items: center; justify-content: center;
        font-size: 36px;
        animation: pulse 2s ease-in-out infinite;
      }
      #splash-title {
        font-family: system-ui, sans-serif;
        font-weight: 800; font-size: 20px;
        letter-spacing: 3px; color: #E4A24B;
        text-transform: uppercase;
      }
      #splash-bar {
        width: 140px; height: 3px;
        background: rgba(255,255,255,0.06);
        border-radius: 99px; overflow: hidden;
      }
      #splash-bar-fill {
        height: 100%; width: 0%; border-radius: 99px;
        background: linear-gradient(90deg, #E4A24B, #5BBE8A);
        animation: bar 1.8s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,100% { box-shadow: 0 0 24px rgba(228,162,75,0.12); }
        50%      { box-shadow: 0 0 48px rgba(228,162,75,0.28); }
      }
      @keyframes bar {
        0%   { width: 0%;   opacity: 1; }
        60%  { width: 100%; opacity: 1; }
        100% { width: 100%; opacity: 0; }
      }
    </style>
  </head>
  <body>
    <!-- Native splash: visible until React mounts and hides it -->
    <div id="splash">
      <div id="splash-logo">🐦</div>
      <div id="splash-title">Колібрі</div>
      <div id="splash-bar"><div id="splash-bar-fill"></div></div>
    </div>
    <div id="root"></div>
    <script>
      // Hide splash once React root mounts (MutationObserver)
      const splash = document.getElementById('splash');
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.childElementCount > 0) {
          splash.classList.add('hide');
          setTimeout(() => splash.remove(), 500);
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
